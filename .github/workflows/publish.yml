name: publish-package
run-name: publish moon.mod version to mooncakes

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: publish-package
  cancel-in-progress: false

jobs:
  publish:
    name: publish
    runs-on: ubuntu-latest
    environment: mooncakes
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: install moonbit
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> $GITHUB_PATH

      - name: version
        run: |
          moon version --all
          moonrun --version

      - name: install openblas
        run: |
          sudo apt-get update
          sudo apt-get install -y libopenblas-dev

      - name: verify package version
        run: |
          test -f moon.mod
          test ! -f moon.mod.json
          test -f README.md
          pkg_version="$(sed -n 's/^version = "\(.*\)"$/\1/p' moon.mod)"
          echo "moon.mod version: $pkg_version"
          test -n "$pkg_version"

      - name: update registry
        run: moon update

      - name: warm dependencies
        run: moon check --target all

      - name: check
        run: moon check --target all --frozen

      - name: test openblas backend
        run: moon test src/backends/openblas --target native

      - name: test
        run: bash ./run_test.sh --frozen

      - name: publish
        env:
          SECRET: ${{ secrets.LUNA_MOONCAKE }}
        run: |
          test -n "$SECRET"
          mkdir -p "$HOME/.moon"
          trap 'rm -f "$HOME/.moon/credentials.json"' EXIT
          printf '%s' "$SECRET" > "$HOME/.moon/credentials.json"
          moon publish --frozen
